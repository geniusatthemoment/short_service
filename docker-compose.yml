services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: short_service
      POSTGRES_USER: short_service
      POSTGRES_PASSWORD: short_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U short_service -d short_service"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
