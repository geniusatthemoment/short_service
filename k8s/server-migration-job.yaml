apiVersion: batch/v1
kind: Job
metadata:
  name: short-service-migrate
  namespace: url-shortener
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: short-service-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: bakr123/short_service:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: short-service-postgres
                  key: DATABASE_URL
